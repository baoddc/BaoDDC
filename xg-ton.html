<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bão</title>
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/xg/xg-ton.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">◉ BÃO</div>
    <nav>
      <ul>
        <li class="dropdown">
          <a>XÀ GỒ</a>
          <ul class="dropdown-menu">
            <li><a href="xg-nhap.html">Nhập</a></li>
            <li><a href="xg-xuat.html">Xuất</a></li>
            <li><a href="xg-ton.html" >Tồn</a></li>
          </ul>
        </li>
        <li><a href="#tole">TOLE</a></li>
        <li><a href="#phe_lieu">PHẾ LIỆU</a></li>
        <li><a href="#blog">ABOUT</a></li>
      </ul>
    </nav>
    <div class="user-info">
      <small class="text-muted">Đăng nhập: <strong id="currentUsername">...</strong></small>
      <button id="btnLogout" class="btn-logout">Đăng xuất</button>
    </div>
  </header>

  <!-- ==================== MAIN CONTENT ==================== -->
  <div class="container-fluid main-content">
  
    <div class="row">
      <!-- Data Table Column - Full Width -->
      <div class="col-12">
        <!-- Title Row -->
        <div class="d-flex align-items-center mb-2">
          <div class="me-auto">
            <h5 class="mb-0 text-primary fw-bold">Dữ liệu Tồn xà gồ</h5>
          </div>
        </div>
        
        <!-- Search and Actions Row -->
        <div class="d-flex align-items-center gap-2 mb-2">
          <div class="flex-grow-1">
            <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Tìm kiếm: Mã vật tư, Tên vật tư...">
          </div>
          <div>
            <button id="btnResetFilter" class="btn btn-secondary btn-sm">Reset</button>
          </div>
          <div>
            <button id="btnExport" class="btn btn-success btn-sm" disabled>
              Tải file Excel (.xlsx)
            </button>
          </div>
        </div>

        <!-- Loading indicator -->
        <div id="loading">Đang tải dữ liệu...</div>

        <!-- Data Table -->
        <div class="table-responsive mt-3">
          <table id="dataTable" class="table table-striped table-bordered table-hover">
            <thead></thead>
            <tbody></tbody>
          </table>
        </div>

        <!-- Pagination Controls -->
        <div class="d-flex align-items-center justify-content-end mb-0" style="margin-top: 2px;">
          <div class="d-flex align-items-center gap-2">
            <button id="prevPage" class="btn btn-sm btn-outline-secondary">← Trang trước</button>
            <select id="pageSelect" class="form-select form-select-sm" style="width: auto;">
              <!-- Page options will be populated by JavaScript -->
            </select>
            <button id="nextPage" class="btn btn-sm btn-outline-secondary">Trang sau →</button>
          </div>
          <div class="text-muted small ms-3">
            <span id="pageInfo">Trang 1 / 1</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== SCRIPTS ==================== -->

  <!-- SheetJS (xlsx) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- Custom JavaScript -->
  <script src="assets/js/xg/xg-ton.js"></script>

  <!-- Bootstrap JS (for dropdown) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
